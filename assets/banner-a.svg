<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="420" viewBox="0 0 1500 420" role="img" aria-label="Oleg Nifontov  Python Backend Developer">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050A0F"/>
      <stop offset="100%" stop-color="#0A1522"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#4DA6FF"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#4DA6FF" stop-opacity="0.22">
        <animate attributeName="stop-opacity" values="0.14;0.28;0.14" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4DA6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1A2A3A" stroke-width="1" opacity="0.45"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="26"/></filter>
  </defs>

  <rect width="1500" height="420" fill="url(#bg)"/>
  <rect width="1500" height="420" fill="url(#grid)" opacity="0.55"/>
  <circle cx="1020" cy="170" r="230" fill="url(#glow)" filter="url(#blur)"/>
  <rect x="0" y="0" width="1500" height="2" fill="url(#accent)" opacity="0.75"/>

  <text x="36" y="315" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="290" font-weight="800" fill="#4DA6FF" letter-spacing="-12" opacity="0.07">ON
    <animate attributeName="opacity" values="0.05;0.1;0.05" dur="5s" repeatCount="indefinite"/>
  </text>

  <g font-family="Consolas, Menlo, monospace" font-size="14" fill="#4DA6FF" opacity="0.16">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -16; 0 0" dur="14s" repeatCount="indefinite"/>
      <text x="470" y="95">async def main():</text>
      <text x="490" y="122">session = await get_session()</text>
      <text x="490" y="149">app.include_router(router)</text>
      <text x="490" y="176">await bot.start_polling()</text>
      <text x="490" y="203">return {"status": "ok"}</text>
    </g>
  </g>

  <text x="72" y="118" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" letter-spacing="2">OLEG NIFONTOV</text>

  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#C8D3DE">
    <rect x="72" y="148" width="4" height="17" rx="1" fill="#4DA6FF"/><text x="88" y="162">Python Backend Developer</text>
    <rect x="72" y="178" width="4" height="17" rx="1" fill="#4DA6FF"/><text x="88" y="192">AI Automation Engineer</text>
    <rect x="72" y="208" width="4" height="17" rx="1" fill="#4DA6FF"/><text x="88" y="222">Telegram Bot Developer</text>
    <rect x="72" y="238" width="4" height="17" rx="1" fill="#4DA6FF"/><text x="88" y="252">Backend &amp; Web Applications</text>
  </g>

  <text x="470" y="310" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#8B9AAB">Building AI Assistants, Automation Tools</text>
  <text x="470" y="336" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" fill="#8B9AAB">&amp; Backend Systems </text>
  <text x="645" y="336" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="700" fill="#4DA6FF">with Python</text>

  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4s" begin="0s" repeatCount="indefinite"/>
      <rect x="980" y="72" width="200" height="50" rx="14" fill="url(#pill)" stroke="#4DA6FF" stroke-opacity="0.4"/>
      <circle cx="1012" cy="97" r="13" fill="#3776AB"/><text x="1012" y="101" text-anchor="middle" font-size="10" fill="#FFD43B">Py</text>
      <text x="1038" y="102">Python</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4s" begin="0.3s" repeatCount="indefinite"/>
      <rect x="1210" y="72" width="220" height="50" rx="14" fill="url(#pill)" stroke="#4DA6FF" stroke-opacity="0.4"/>
      <circle cx="1242" cy="97" r="13" fill="#0B1A28" stroke="#4DA6FF"/>
      <path d="M1235,91 C1235,87 1249,87 1249,91 C1249,96 1246,99 1242,102 C1238,99 1235,96 1235,91 Z" fill="none" stroke="#7EC8FF" stroke-width="1.4"/>
      <text x="1268" y="102">AI</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4s" begin="0.6s" repeatCount="indefinite"/>
      <rect x="980" y="142" width="200" height="50" rx="14" fill="url(#pill)" stroke="#4DA6FF" stroke-opacity="0.4"/>
      <circle cx="1012" cy="167" r="13" fill="#336791"/><text x="1012" y="171" text-anchor="middle" font-size="10" fill="#FFF">PG</text>
      <text x="1038" y="172">PostgreSQL</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4s" begin="0.9s" repeatCount="indefinite"/>
      <rect x="1210" y="142" width="220" height="50" rx="14" fill="url(#pill)" stroke="#4DA6FF" stroke-opacity="0.4"/>
      <circle cx="1242" cy="167" r="13" fill="#0B1A28" stroke="#4DA6FF"/>
      <text x="1242" y="172" text-anchor="middle" font-size="10" fill="#4DA6FF">&lt;/&gt;</text>
      <text x="1268" y="172">REST API</text>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4s" begin="1.2s" repeatCount="indefinite"/>
      <rect x="980" y="212" width="450" height="50" rx="14" fill="url(#pill)" stroke="#4DA6FF" stroke-opacity="0.4"/>
      <circle cx="1012" cy="237" r="13" fill="#229ED9"/>
      <path d="M1004,239 L1019,231 L1014,245 L1010,240 Z" fill="#FFF"/>
      <text x="1038" y="242">Telegram</text>
    </g>
  </g>

  <rect x="0" y="418" width="1500" height="2" fill="url(#accent)" opacity="0.55"/>
</svg>
