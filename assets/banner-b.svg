<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="420" viewBox="0 0 1500 420" role="img" aria-label="Oleg Nifontov  Tech workflow">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050A0F"/>
      <stop offset="100%" stop-color="#0A1522"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#4DA6FF"/>
    </linearGradient>
    <linearGradient id="name" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7EC8FF"/><stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="streak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4DA6FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4DA6FF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="55%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#4DA6FF" stop-opacity="0.2">
        <animate attributeName="stop-opacity" values="0.12;0.26;0.12" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4DA6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1A2A3A" stroke-width="1" opacity="0.4"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
  </defs>

  <rect width="1500" height="420" fill="url(#bg)"/>
  <rect width="1500" height="420" fill="url(#grid)" opacity="0.5"/>
  <circle cx="780" cy="160" r="240" fill="url(#glow)" filter="url(#blur)"/>
  <rect x="-350" y="145" width="350" height="28" fill="url(#streak)" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="1850 0" dur="7s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="0" width="1500" height="2" fill="url(#accent)" opacity="0.75"/>

  <g transform="translate(64, 70)">
    <rect width="68" height="68" rx="14" fill="#0B1520" stroke="#4DA6FF" stroke-width="1.8">
      <animate attributeName="stroke-opacity" values="0.45;1;0.45" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="34" y="45" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">ON</text>
  </g>

  <text x="156" y="104" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="800" fill="url(#name)" letter-spacing="1.5">OLEG NIFONTOV</text>

  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" fill="#C8D3DE">
    <circle cx="164" cy="134" r="3" fill="#4DA6FF"/><text x="178" y="139">Python Backend Developer</text>
    <circle cx="164" cy="162" r="3" fill="#4DA6FF"/><text x="178" y="167">AI Automation Engineer</text>
    <circle cx="164" cy="190" r="3" fill="#4DA6FF"/><text x="178" y="195">Telegram Bot Developer</text>
    <circle cx="164" cy="218" r="3" fill="#4DA6FF"/><text x="178" y="223">Backend &amp; Web Applications</text>
  </g>

  <line x1="500" y1="110" x2="500" y2="220" stroke="#1E3A5F" stroke-width="1.5"/>

  <text x="530" y="160" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#8B9AAB">Building AI Assistants, Automation Tools</text>
  <text x="530" y="188" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#8B9AAB">&amp; Backend Systems </text>
  <text x="715" y="188" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="700" fill="#4DA6FF">with Python</text>

  <!-- Pipeline -->
  <line x1="920" y1="160" x2="1410" y2="160" stroke="#4DA6FF" stroke-width="2" stroke-dasharray="6 8" opacity="0.55">
    <animate attributeName="stroke-dashoffset" from="0" to="-28" dur="1.6s" repeatCount="indefinite"/>
  </line>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#94A3B8">
    <g transform="translate(900, 128)">
      <rect width="60" height="60" rx="12" fill="#0B1520" stroke="#4DA6FF" stroke-width="1.4">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="0s" repeatCount="indefinite"/>
      </rect>
      <circle cx="30" cy="26" r="11" fill="#3776AB"/><text x="30" y="30" text-anchor="middle" fill="#FFD43B" font-size="9" font-weight="700">Py</text>
      <text x="30" y="50" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(1010, 128)">
      <rect width="60" height="60" rx="12" fill="#0B1520" stroke="#4DA6FF" stroke-width="1.4">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="0.25s" repeatCount="indefinite"/>
      </rect>
      <text x="30" y="32" text-anchor="middle" fill="#4DA6FF" font-size="11" font-weight="700" font-family="Consolas, monospace">&lt;/&gt;</text>
      <text x="30" y="50" text-anchor="middle">REST</text>
    </g>
    <g transform="translate(1120, 128)">
      <rect width="60" height="60" rx="12" fill="#0B1520" stroke="#4DA6FF" stroke-width="1.4">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
      <circle cx="30" cy="26" r="11" fill="#336791"/><text x="30" y="30" text-anchor="middle" fill="#FFF" font-size="9" font-weight="700">PG</text>
      <text x="30" y="50" text-anchor="middle">Postgres</text>
    </g>
    <g transform="translate(1230, 128)">
      <rect width="60" height="60" rx="12" fill="#0B1520" stroke="#4DA6FF" stroke-width="1.4">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="0.75s" repeatCount="indefinite"/>
      </rect>
      <circle cx="30" cy="26" r="10" fill="none" stroke="#10A37F" stroke-width="2"/><circle cx="30" cy="26" r="3.5" fill="#10A37F"/>
      <text x="30" y="50" text-anchor="middle">OpenAI</text>
    </g>
    <g transform="translate(1340, 128)">
      <rect width="60" height="60" rx="12" fill="#0B1520" stroke="#4DA6FF" stroke-width="1.4">
        <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="1s" repeatCount="indefinite"/>
      </rect>
      <circle cx="30" cy="26" r="11" fill="#229ED9"/><path d="M23,28 L38,20 L32,34 L28,29 Z" fill="#FFF"/>
      <text x="30" y="50" text-anchor="middle">Telegram</text>
    </g>
  </g>

  <!-- Footer skills -->
  <rect x="64" y="300" width="1372" height="68" rx="14" fill="#0B1520" stroke="#1E3A5F"/>
  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" fill="#C8D3DE">
    <g transform="translate(120, 324)"><circle cx="12" cy="14" r="10" fill="#122033" stroke="#4DA6FF"/><path d="M7,14 L11,18 L18,9" fill="none" stroke="#4DA6FF" stroke-width="1.6"/><text x="32" y="19">Async IO</text></g>
    <g transform="translate(360, 324)"><circle cx="12" cy="14" r="10" fill="#122033" stroke="#4DA6FF"/><circle cx="12" cy="14" r="4" fill="none" stroke="#4DA6FF"/><text x="32" y="19">Automation</text></g>
    <g transform="translate(620, 324)"><circle cx="12" cy="14" r="10" fill="#122033" stroke="#4DA6FF"/><path d="M7,11 C7,7 17,7 17,11 C17,15 15,17 12,19 C9,17 7,15 7,11 Z" fill="none" stroke="#7EC8FF" stroke-width="1.3"/><text x="32" y="19">AI Integration</text></g>
    <g transform="translate(900, 324)"><circle cx="12" cy="14" r="10" fill="#122033" stroke="#4DA6FF"/><rect x="7" y="9" width="10" height="10" rx="1.5" fill="none" stroke="#4DA6FF"/><text x="32" y="19">Clean Architecture</text></g>
    <g transform="translate(1180, 324)"><circle cx="12" cy="14" r="10" fill="#122033" stroke="#4DA6FF"/><path d="M7,18 L12,9 L17,18 Z" fill="none" stroke="#4DA6FF" stroke-width="1.4"/><text x="32" y="19">Scalable Solutions</text></g>
  </g>

  <rect x="0" y="418" width="1500" height="2" fill="url(#accent)" opacity="0.55"/>
</svg>
