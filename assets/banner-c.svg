<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="420" viewBox="0 0 1500 420" role="img" aria-label="Oleg Nifontov  Minimal profile banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050A0F"/>
      <stop offset="100%" stop-color="#0A1522"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#4DA6FF"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#1A2A3A" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1500" height="420" fill="url(#bg)"/>
  <rect width="1500" height="420" fill="url(#grid)" opacity="0.4"/>
  <rect x="0" y="0" width="1500" height="2" fill="url(#accent)" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.85;0.4" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Outline ON, blue N stem -->
  <g transform="translate(64, 100)" fill="none" stroke="#F8FAFC" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="52" cy="90" rx="46" ry="76"/>
    <path d="M132,166 V14"/>
    <path d="M132,14 L200,166"/>
    <path d="M200,166 V14" stroke="#4DA6FF">
      <animate attributeName="stroke" values="#4DA6FF;#7EC8FF;#4DA6FF" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <line x1="320" y1="90" x2="320" y2="310" stroke="#1E3A5F" stroke-width="1.4" opacity="0.9"/>
  <line x1="820" y1="90" x2="820" y2="310" stroke="#1E3A5F" stroke-width="1.4" opacity="0.9"/>

  <text x="360" y="140" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="36" font-weight="300" fill="#FFFFFF" letter-spacing="5">OLEG NIFONTOV</text>

  <g font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" fill="#9AA8B6">
    <text x="360" y="186"><tspan fill="#4DA6FF">/</tspan>  Python Backend Developer</text>
    <text x="360" y="214"><tspan fill="#4DA6FF">/</tspan>  AI Automation Engineer</text>
    <text x="360" y="242"><tspan fill="#4DA6FF">/</tspan>  Telegram Bot Developer</text>
    <text x="360" y="270"><tspan fill="#4DA6FF">/</tspan>  Backend &amp; Web Applications</text>
  </g>

  <text x="860" y="170" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#8B9AAB">Building AI Assistants, Automation Tools</text>
  <text x="860" y="200" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" fill="#8B9AAB">&amp; Backend Systems </text>
  <text x="1048" y="200" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="17" font-weight="700" fill="#4DA6FF">with Python</text>

  <g fill="none" stroke="#E8EEF4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <g transform="translate(880, 250)">
      <rect x="6" y="0" width="24" height="34" rx="7"/>
      <path d="M18,7 V27" stroke="#4DA6FF"/>
      <text x="18" y="52" text-anchor="middle" fill="#9AA8B6" stroke="none" font-family="Segoe UI, Arial, sans-serif" font-size="12">Python</text>
    </g>
    <g transform="translate(1000, 250)">
      <ellipse cx="18" cy="8" rx="14" ry="6"/>
      <path d="M4,8 V24 C4,30 32,30 32,24 V8"/>
      <path d="M4,15 C4,21 32,21 32,15" opacity="0.7"/>
      <text x="18" y="52" text-anchor="middle" fill="#9AA8B6" stroke="none" font-family="Segoe UI, Arial, sans-serif" font-size="12">PostgreSQL</text>
    </g>
    <g transform="translate(1140, 250)">
      <path d="M8,10 C8,3 28,3 28,10 C28,17 23,20 18,26 C13,20 8,17 8,10 Z"/>
      <circle cx="14" cy="11" r="1.3" fill="#E8EEF4" stroke="none"/>
      <circle cx="22" cy="11" r="1.3" fill="#E8EEF4" stroke="none"/>
      <text x="18" y="52" text-anchor="middle" fill="#9AA8B6" stroke="none" font-family="Segoe UI, Arial, sans-serif" font-size="12">AI</text>
    </g>
    <g transform="translate(1260, 250)">
      <path d="M2,18 L36,6 L26,32 L18,23 Z"/>
      <path d="M18,23 L36,6" opacity="0.55"/>
      <text x="18" y="52" text-anchor="middle" fill="#9AA8B6" stroke="none" font-family="Segoe UI, Arial, sans-serif" font-size="12">Telegram</text>
    </g>
  </g>

  <line x1="64" y1="360" x2="1436" y2="360" stroke="#E8EEF4" stroke-width="1" opacity="0.25">
    <animate attributeName="opacity" values="0.15;0.35;0.15" dur="5s" repeatCount="indefinite"/>
  </line>
  <rect x="0" y="418" width="1500" height="2" fill="url(#accent)" opacity="0.5"/>
</svg>
